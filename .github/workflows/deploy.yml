name: Despliegue Automático en Hosting PHP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Compilar y Desplegar
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Obtener el código
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: 📦 Instalar dependencias
      run: npm ci

    - name: 🏗️ Compilar sitio estático (Astro Build)
      run: npm run build

    - name: 🚀 Desplegar vía FTP a tu hosting PHP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}       # Servidor FTP (ej: ftp.tudominio.com)
        username: ${{ secrets.FTP_USERNAME }}   # Usuario FTP de cPanel
        password: ${{ secrets.FTP_PASSWORD }}   # Contraseña FTP
        local-dir: ./dist/                      # Subir solo la carpeta compilada de Astro
        server-dir: /copivgt.com/               # Carpeta destino en tu servidor PHP
